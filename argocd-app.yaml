apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-full-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL:  https://github.com/chandusaigari/project2.git
    targetRevision: main
    path: k8s   # 👈 folder where all your YAMLs are

  destination:
    server: https://kubernetes.default.svc
    namespace: e-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true