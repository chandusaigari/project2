apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chandusaigari/project2.git
    targetRevision: main
    path: kubernetes  # Dedicated folder
    directory:
      recurse: true   # Include subdirectories
  destination:
    server: https://kubernetes.default.svc
    namespace: e-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true   
