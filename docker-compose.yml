version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: db
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: db
    ports:
      - "3306:3306"
    volumes:
      - mydata:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - calc_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdb"]
      #                                                                      ↑
      #                                                    matches MYSQL_ROOT_PASSWORD: db
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build: ./backend
    container_name: flask_backend
    restart: on-failure
    environment:
      DB_HOST: mysql
      DB_USER: db          # ← matches MYSQL_USER: db
      DB_PASSWORD: db      # ← matches MYSQL_PASSWORD: db
      DB_NAME: db          # ← matches MYSQL_DATABASE: db
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/logs
    networks:
      - calc_network

  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - calc_network

volumes:
 mydata:
  
networks:
  calc_network:
    driver: bridge
