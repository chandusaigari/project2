apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: e-ns 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: chandu0303/project2-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
