apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/chandusaigari/project2.git
    targetRevision: main
    path: .   # root folder (your YAMLs)

  destination:
    server: https://kubernetes.default.svc
    namespace: e-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
